<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ライセンス情報 - Capty Policy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>ライセンス情報</h1>
      <p class="subtitle">Licenses</p>
    </header>

    <div class="content">
      <a href="index.html" class="back-link">トップページに戻る</a>

      <h2>使用素材のライセンス一覧</h2>
      <p class="small-note">
        このページは、アプリで利用している画像のライセンス情報（リポジトリ直下の `license_info.json`）を読み込み、
        詳細（`local_file` / `title` / `artist` / `license`）を一覧表示します。
      </p>

      <div class="filter-row">
        <input id="searchInput" type="search" placeholder="検索（local_file / artist / title / license）" />
      </div>

      <p id="resultMeta" class="small-note"></p>

      <div class="table-wrap">
        <table class="license-table">
          <thead>
            <tr>
              <th style="width: 160px;">local_file</th>
              <th>title</th>
              <th style="width: 180px;">artist</th>
              <th style="width: 220px;">license</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>

      <p id="loadError" class="small-note" style="display:none; color:#b00020;"></p>
    </div>

    <footer>
      <p>&copy; 2025 Capty. All rights reserved.</p>
    </footer>
  </div>

  <script>
    // GitHub上のJSON（生データ）を参照
    const jsonPath = "https://raw.githubusercontent.com/mappou/capty-policy/main/capty_resouce/artists_json_data/license_info.json";

    let allItems = [];

    function normalizeText(value) {
      return String(value ?? "").replace(/\s+/g, " ").trim();
    }

    function truncate(value, maxLen) {
      const s = normalizeText(value);
      if (s.length <= maxLen) return s;
      return s.slice(0, maxLen) + "…";
    }

    function applyFilterAndRender() {
      const q = normalizeText(document.getElementById("searchInput").value).toLowerCase();

      const filtered = allItems.filter((it) => {
        if (!q) return true;
        const haystack = [
          it.local_file,
          it.title,
          it.artist,
          it.license,
        ].map((x) => normalizeText(x).toLowerCase()).join(" ");

        return haystack.includes(q);
      });

      const shown = filtered; // すべて表示

      const rows = document.getElementById("rows");
      rows.innerHTML = "";

      for (const it of shown) {
        const tr = document.createElement("tr");

        const tdLocalFile = document.createElement("td");
        tdLocalFile.textContent = normalizeText(it.local_file);
        tr.appendChild(tdLocalFile);

        const tdTitle = document.createElement("td");
        tdTitle.textContent = truncate(it.title, 70);
        tr.appendChild(tdTitle);

        const tdArtist = document.createElement("td");
        tdArtist.textContent = normalizeText(it.artist);
        tr.appendChild(tdArtist);

        const tdLicense = document.createElement("td");
        tdLicense.textContent = normalizeText(it.license);
        tr.appendChild(tdLicense);

        rows.appendChild(tr);
      }

      const meta = document.getElementById("resultMeta");
      meta.textContent = `表示中: ${shown.length}件（該当: ${filtered.length}件）`;
    }

    async function loadJsonAndInit() {
      const loadError = document.getElementById("loadError");
      try {
        const res = await fetch(jsonPath, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        allItems = await res.json();

        applyFilterAndRender();

        document.getElementById("searchInput").addEventListener("input", applyFilterAndRender);
      } catch (e) {
        loadError.style.display = "block";
        loadError.textContent = `読み込みに失敗しました: ${e?.message ?? String(e)}`;
      }
    }

    document.addEventListener("DOMContentLoaded", loadJsonAndInit);
  </script>
</body>
</html>
